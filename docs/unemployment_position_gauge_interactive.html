
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{display:grid;grid-template-columns:260px 1fr 220px;gap:16px;padding:1rem 0;font-family:var(--font-sans);min-height:480px}
.panel{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem}
.panel-title{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:12px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.field input{width:100%;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans)}
.field input:focus{outline:none;border-color:var(--color-border-secondary)}
.section-sep{height:0.5px;background:var(--color-border-tertiary);margin:12px 0}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100%}
.gauge-label{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-secondary)}
.status-badge{font-size:12px;font-weight:500;padding:4px 14px;border-radius:20px;margin-top:4px;transition:background .4s,color .4s}
.stat-cards{display:flex;flex-direction:column;gap:8px}
.scard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;position:relative}
.scard::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:2.5px;border-radius:2px}
.scard.neutral::before{background:#888}
.scard.good::before{background:#3B6D11}
.scard.warn::before{background:#BA7517}
.scard.danger::before{background:#A32D2D}
.scard-label{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:3px}
.scard-val{font-size:17px;font-weight:500;color:var(--color-text-primary);transition:color .3s}
.scard-val.good{color:#3B6D11}
.scard-val.warn{color:#BA7517}
.scard-val.danger{color:#A32D2D}
.scard-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
</style>

<h2 class="sr-only">Unemployment position gauge — interactive emergency reserve dashboard</h2>

<div class="wrap">
  <div class="panel">
    <div class="panel-title">Baseline finances</div>
    <div class="field"><label>Annual income ($)</label><input type="number" id="income" value="100000" step="1000"></div>
    <div class="field"><label>Spouse annual income ($)</label><input type="number" id="spouse" value="0" step="1000"></div>
    <div class="field"><label>Monthly burn rate ($)</label><input type="number" id="burn" value="12000" step="500"></div>
    <div class="field"><label>Liquid emergency savings ($)</label><input type="number" id="savings" value="4" step="100"></div>
    <div class="section-sep"></div>
    <div class="panel-title">Transition offsets</div>
    <div class="field"><label>Severance ($/mo)</label><input type="number" id="sevAmt" value="2500" step="100"></div>
    <div class="field"><label>Severance duration (mo)</label><input type="number" id="sevDur" value="12" step="1"></div>
    <div class="field"><label>Unemployment benefit ($/mo)</label><input type="number" id="ubAmt" value="4000" step="100"></div>
    <div class="field"><label>UB duration (mo)</label><input type="number" id="ubDur" value="10" step="1"></div>
    <div class="field"><label>Estimated search duration (mo)</label><input type="number" id="search" value="6" step="1"></div>
  </div>

  <div class="panel gauge-wrap">
    <div class="gauge-label">Position gauge</div>
    <svg id="gauge-svg" viewBox="0 0 200 360" style="width:160px;height:100%;max-height:340px;overflow:visible" role="img" aria-label="Emergency reserve position gauge showing current savings vs target zones">
      <defs>
        <clipPath id="tank-clip"><rect x="30" y="20" width="100" height="300" rx="14"/></clipPath>
      </defs>
      <rect x="30" y="20" width="100" height="300" rx="14" fill="rgba(0,0,0,0.08)" stroke="var(--color-border-secondary)" stroke-width="1"/>
      <rect id="zone-danger" x="30" y="270" width="100" height="50" clip-path="url(#tank-clip)" fill="#F09595" opacity="0.55"/>
      <rect id="zone-min"    x="30" y="170" width="100" height="100" clip-path="url(#tank-clip)" fill="#FAC775" opacity="0.5"/>
      <rect id="zone-ideal"  x="30" y="20"  width="100" height="150" clip-path="url(#tank-clip)" fill="#97C459" opacity="0.45"/>
      <rect id="fill-bar" x="30" y="320" width="100" height="0" clip-path="url(#tank-clip)" fill="#378ADD" opacity="0.85" style="transition:y .55s cubic-bezier(.4,0,.2,1),height .55s cubic-bezier(.4,0,.2,1)"/>
      <line x1="24" y1="170" x2="136" y2="170" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" stroke-dasharray="4,3"/>
      <line x1="24" y1="20"  x2="136" y2="20"  stroke="#639922" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
      <text x="18" y="324" text-anchor="end" font-size="9" fill="var(--color-text-secondary)">0mo</text>
      <text x="18" y="224" text-anchor="end" font-size="9" fill="var(--color-text-secondary)">3mo</text>
      <text x="18" y="124" text-anchor="end" font-size="9" fill="var(--color-text-secondary)">6mo</text>
      <text x="18" y="24"  text-anchor="end" font-size="9" fill="var(--color-text-secondary)">9mo</text>
      <line id="needle" x1="26" y1="320" x2="136" y2="320" stroke="#378ADD" stroke-width="2" stroke-dasharray="5,3" style="transition:y1 .55s cubic-bezier(.4,0,.2,1),y2 .55s cubic-bezier(.4,0,.2,1)"/>
      <circle id="needle-dot" cx="130" cy="320" r="5" fill="#378ADD" style="transition:cy .55s cubic-bezier(.4,0,.2,1)"/>
      <text id="needle-label" x="142" y="324" font-size="9" font-weight="500" fill="#378ADD" style="transition:all .55s">$0</text>
      <text x="80" y="100" text-anchor="middle" font-size="11" font-weight="500" fill="#3B6D11">Ideal</text>
      <text x="80" y="225" text-anchor="middle" font-size="10" fill="#BA7517">Minimum</text>
      <text x="80" y="300" text-anchor="middle" font-size="10" fill="#A32D2D">Danger</text>
    </svg>
    <div id="status-badge" class="status-badge">—</div>
    <div id="gauge-sub" style="font-size:11px;color:var(--color-text-secondary);text-align:center;margin-top:2px"></div>
  </div>

  <div class="stat-cards" id="stat-cards"></div>
</div>

<script>
const ids=['income','spouse','burn','savings','sevAmt','sevDur','ubAmt','ubDur','search'];
ids.forEach(id=>document.getElementById(id).addEventListener('input',update));

function fmt(n){
  if(Math.abs(n)>=1000000)return(n<0?'-':'')+'$'+Math.abs((n/1000000)).toFixed(1)+'M';
  if(Math.abs(n)>=1000)return(n<0?'-':'')+'$'+Math.round(Math.abs(n)/1000)+'K';
  return(n<0?'-':'')+'$'+Math.round(Math.abs(n));
}
function fmtMo(n){return Math.round(n*10)/10+' mo';}

function update(){
  const income  = +document.getElementById('income').value||0;
  const spouse  = +document.getElementById('spouse').value||0;
  const burn    = +document.getElementById('burn').value||1;
  const savings = +document.getElementById('savings').value||0;
  const sevAmt  = +document.getElementById('sevAmt').value||0;
  const sevDur  = +document.getElementById('sevDur').value||0;
  const ubAmt   = +document.getElementById('ubAmt').value||0;
  const ubDur   = +document.getElementById('ubDur').value||0;
  const search  = +document.getElementById('search').value||1;

  const monthly       = income/12;
  const cashFlow      = monthly - burn;
  const minRes        = burn*3;
  const optRes        = burn*6;
  const runway        = savings/burn;
  const monthlyOffset = sevAmt + ubAmt;
  const totalSev      = sevAmt * sevDur;
  const totalUB       = ubAmt  * ubDur;
  const offsetPool    = totalSev + totalUB;
  const onsetTotal    = savings + offsetPool;
  const netBurn       = Math.max(0, burn - monthlyOffset);
  const totalExp      = burn * search;
  const totalOff      = monthlyOffset * Math.min(Math.max(sevDur,ubDur), search);
  const netNeeded     = Math.max(0, totalExp - totalOff);
  const shortfall     = Math.max(0, netNeeded - savings);
  const effRunway     = netBurn > 0 ? onsetTotal/netBurn : onsetTotal/burn;
  const covPct        = Math.min(savings/optRes*100, 100);

  const status = runway < 1.5 ? {label:'Danger zone',cls:'danger',color:'#A32D2D',bg:'#FCEBEB'} :
                 runway < 3   ? {label:'Below minimum',cls:'warn',color:'#BA7517',bg:'#FAEEDA'} :
                 runway < 4.5 ? {label:'Minimum met',cls:'warn',color:'#BA7517',bg:'#FAEEDA'} :
                 runway < 6   ? {label:'Ideal range',cls:'good',color:'#3B6D11',bg:'#EAF3DE'} :
                                {label:'Strong position',cls:'good',color:'#3B6D11',bg:'#EAF3DE'};

  const maxMo    = 9;
  const TANK_TOP = 20, TANK_H = 300;
  const clampMo  = Math.min(runway, maxMo);
  const fillH    = (clampMo/maxMo)*TANK_H;
  const fillY    = TANK_TOP + TANK_H - fillH;
  const needleY  = fillY;

  document.getElementById('fill-bar').setAttribute('y', fillY);
  document.getElementById('fill-bar').setAttribute('height', fillH);
  document.getElementById('needle').setAttribute('y1', needleY);
  document.getElementById('needle').setAttribute('y2', needleY);
  document.getElementById('needle-dot').setAttribute('cy', needleY);
  document.getElementById('needle-label').setAttribute('y', needleY+4);
  document.getElementById('needle-label').textContent = fmt(savings);

  const badge = document.getElementById('status-badge');
  badge.textContent = status.label;
  badge.style.background = status.bg;
  badge.style.color = status.color;

  document.getElementById('gauge-sub').textContent = fmtMo(runway)+' of runway \u2022 '+Math.round(covPct)+'% coverage';

  const cfCls  = cashFlow<0?'danger':cashFlow<500?'warn':'good';
  const runCls = runway<3?'danger':runway<6?'warn':'good';
  const shCls  = shortfall>0?'danger':'good';
  const efCls  = effRunway>=search?'good':effRunway>=search*0.75?'warn':'danger';

  document.getElementById('stat-cards').innerHTML=`
    <div class="scard ${cfCls}">
      <div class="scard-label">Monthly cash flow</div>
      <div class="scard-val ${cfCls}">${fmt(cashFlow)}</div>
      <div class="scard-sub">Income minus burn rate</div>
    </div>
    <div class="scard ${runCls}">
      <div class="scard-label">Current runway</div>
      <div class="scard-val ${runCls}">${fmtMo(runway)}</div>
      <div class="scard-sub">Savings ÷ burn rate</div>
    </div>
    <div class="scard neutral">
      <div class="scard-label">Available at onset</div>
      <div class="scard-val">${fmt(onsetTotal)}</div>
      <div class="scard-sub">Savings + sev + UB pool</div>
    </div>
    <div class="scard neutral">
      <div class="scard-label">Monthly net burn</div>
      <div class="scard-val">${fmt(netBurn)}</div>
      <div class="scard-sub">Burn rate minus offsets</div>
    </div>
    <div class="scard ${efCls}">
      <div class="scard-label">Effective runway</div>
      <div class="scard-val ${efCls}">${fmtMo(effRunway)}</div>
      <div class="scard-sub">Onset pool ÷ net burn</div>
    </div>
    <div class="scard ${shCls}">
      <div class="scard-label">Shortfall</div>
      <div class="scard-val ${shCls}">${shortfall>0?fmt(shortfall):'$0 — Fully covered'}</div>
      <div class="scard-sub">Net needed minus savings</div>
    </div>
  `;
}
update();
</script>
